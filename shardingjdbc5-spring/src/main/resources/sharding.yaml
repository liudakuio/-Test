dataSources:
  ds:
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource
    driverClassName: com.mysql.cj.jdbc.Driver
    jdbcUrl: jdbc:mysql://127.0.0.1:3306/ds_0?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=GMT%2B8
    username: root
    password: 123456

rules:
  - !SHARDING
    tables:

      t_ent_order:
        actualDataNodes: ds.t_ent_order

      t_ent_order_detail:
        actualDataNodes: ds.t_ent_order_detail

      t_ent_order_item:
        actualDataNodes: ds.t_ent_order_item_$->{0..7}
        tableStrategy:
          complex:
            shardingColumns: id,ent_id
            shardingAlgorithmName: hash-slot-table-algorithm

    bindingTables:
      - t_ent_order,t_ent_order_detail

    shardingAlgorithms:
      hash-slot-table-algorithm:
        type: CLASS_BASED
        props:
          strategy: complex
          algorithmClassName: cn.javayong.shardingjdbc5.spring.common.sharding.HashSlotAlgorithm
          directIndex: true

  - !BROADCAST
    tables:
      - t_city

props:
  sql-show: true